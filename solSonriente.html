
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paisaje Natural Animado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ========== MEDIA QUERY PARA MÓVIL EN VERTICAL ========== */
        @media (orientation: portrait) {
            .contenedor {
                /* El fondo imita el gradiente del cielo para que las franjas se fundan */
                background: linear-gradient(to bottom, #3BB5EE 0%, #A8DFFE 100%);
            }

            svg {
                /* La imagen se escala para caber completa en el ancho y no excede el alto */
                width: 100%;
                height: auto;
                max-height: 100vh;
            }
        }

        /* Animaciones (sin cambios) */
        .nube-a { animation: moverNube 24s linear infinite; }
        .nube-b { animation: moverNube2 32s linear infinite; }
        .nube-c { animation: moverNube3 20s linear infinite; }

        @keyframes moverNube {
            0% { transform: translateX(-280px); }
            100% { transform: translateX(1150px); }
        }
        @keyframes moverNube2 {
            0% { transform: translateX(1150px); }
            100% { transform: translateX(-280px); }
        }
        @keyframes moverNube3 {
            0% { transform: translateX(-180px); }
            100% { transform: translateX(1150px); }
        }

        .rio-brillo { animation: brilloRio 2.2s ease-in-out infinite alternate; }
        @keyframes brilloRio {
            0% { opacity: .25; }
            100% { opacity: 1; }
        }

        .arbol-i1 { animation: mecer 3.5s ease-in-out infinite alternate; transform-origin: 155px 375px; }
        .arbol-i2 { animation: mecer 4.1s ease-in-out infinite alternate-reverse; transform-origin: 240px 355px; }
        .arbol-d1 { animation: mecer 3.8s ease-in-out infinite alternate; transform-origin: 680px 370px; }
        .arbol-d2 { animation: mecer 4.3s ease-in-out infinite alternate-reverse; transform-origin: 760px 350px; }
        @keyframes mecer {
            0% { transform: rotate(-2.5deg); }
            100% { transform: rotate(2.5deg); }
        }

        .flor1 { animation: mecerFlor 2.5s ease-in-out infinite alternate; transform-origin: 60px 478px; }
        .flor2 { animation: mecerFlor 3.1s ease-in-out infinite alternate-reverse; transform-origin: 130px 472px; }
        .flor3 { animation: mecerFlor 2.8s ease-in-out infinite alternate; transform-origin: 820px 476px; }
        .flor4 { animation: mecerFlor 3.2s ease-in-out infinite alternate-reverse; transform-origin: 860px 474px; }
        .flor5 { animation: mecerFlor 2.6s ease-in-out infinite alternate; transform-origin: 340px 500px; }
        .flor6 { animation: mecerFlor 3.4s ease-in-out infinite alternate-reverse; transform-origin: 560px 500px; }
        .flor7 { animation: mecerFlor 2.9s ease-in-out infinite alternate; transform-origin: 440px 510px; }
        .flor8 { animation: mecerFlor 3.6s ease-in-out infinite alternate-reverse; transform-origin: 200px 488px; }
        .flor9 { animation: mecerFlor 2.7s ease-in-out infinite alternate; transform-origin: 750px 490px; }
        @keyframes mecerFlor {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        .pajaro1 { animation: volarP1 18s linear infinite; }
        .pajaro2 { animation: volarP2 24s linear infinite 4s; }
        @keyframes volarP1 {
            0% { transform: translate(-60px, 0); }
            100% { transform: translate(980px, -25px); }
        }
        @keyframes volarP2 {
            0% { transform: translate(980px, 0); }
            100% { transform: translate(-60px, 35px); }
        }

        .burbuja1 { animation: subirBurbuja 3.2s ease-in-out infinite; }
        .burbuja2 { animation: subirBurbuja 4.1s ease-in-out infinite 1.2s; }
        .burbuja3 { animation: subirBurbuja 3.8s ease-in-out infinite 2s; }
        @keyframes subirBurbuja {
            0% { transform: translateY(0); opacity: .6; }
            100% { transform: translateY(-22px); opacity: 0; }
        }

        .sol-rayos { animation: girarRayos 12s linear infinite; transform-origin: 100px 88px; }
        @keyframes girarRayos {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .frase-texto { animation: aparecer 2.5s ease-in-out forwards; }
        @keyframes aparecer {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
